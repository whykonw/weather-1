<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="带伞吗">
<meta name="theme-color" content="#1a1a2e">
<title>今天带伞吗？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg-1:#0f0c29;--bg-2:#302b63;--bg-3:#24243e;--text:#e0e0e0;--text-dim:rgba(255,255,255,0.4);--accent:#764ba2;--accent-2:#667eea;--card-bg:rgba(255,255,255,0.06);--card-border:rgba(255,255,255,0.08)}
  .theme-rain{--bg-1:#1a1a2e;--bg-2:#16213e;--bg-3:#0f3460;--text:#aed6f1;--text-dim:rgba(174,214,241,0.5);--accent:#2980b9;--accent-2:#3498db;--card-bg:rgba(15,52,96,0.9);--card-border:rgba(174,214,241,0.1)}
  .theme-clear{--bg-1:#fdf6e3;--bg-2:#fceabb;--bg-3:#f8b500;--text:#3e2723;--text-dim:rgba(93,64,55,0.5);--accent:#f39c12;--accent-2:#e67e22;--card-bg:rgba(255,248,225,0.95);--card-border:rgba(255,220,100,0.3)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans SC',-apple-system,sans-serif;min-height:100vh;min-height:100dvh;background:linear-gradient(160deg,var(--bg-1) 0%,var(--bg-2) 40%,var(--bg-3) 100%);display:flex;flex-direction:column;align-items:center;padding:24px 16px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));transition:background 0.8s ease;position:relative;overflow-x:hidden}
  .raindrops{position:fixed;inset:0;pointer-events:none;z-index:0;display:none}.theme-rain .raindrops{display:block}
  .raindrop{position:absolute;top:-10px;background:linear-gradient(to bottom,transparent,rgba(174,214,241,0.4));border-radius:50%;animation:rainfall linear infinite}
  @keyframes rainfall{0%{transform:translateY(-10px);opacity:0}15%{opacity:0.4}100%{transform:translateY(105vh);opacity:0}}
  .sun-glow{position:fixed;top:-80px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,220,100,0.3) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0;display:none;animation:sunpulse 3s ease-in-out infinite}.theme-clear .sun-glow{display:block}
  @keyframes sunpulse{0%,100%{transform:scale(1);opacity:0.3}50%{transform:scale(1.2);opacity:0.45}}
  @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes shake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  .hero-icon{font-size:48px;margin-bottom:8px;animation:bounce 3s ease-in-out infinite}.theme-rain .hero-icon{animation:shake 2s ease-in-out infinite}
  h1{font-size:26px;font-weight:900;color:var(--text);letter-spacing:2px;line-height:1.3}
  .subtitle{font-size:12px;color:var(--text-dim);font-weight:300;letter-spacing:3px;margin-top:4px}
  .action-area{width:100%;max-width:380px;margin:24px 0 16px;animation:slideUp 0.6s ease 0.2s both;text-align:center}
  .btn-main{
    padding:16px 40px;font-size:16px;border:none;border-radius:16px;cursor:pointer;
    background:linear-gradient(135deg,#00b894,#00cec9);
    color:#fff;font-weight:700;font-family:inherit;
    box-shadow:0 4px 20px rgba(0,184,148,0.3);
    transition:all 0.3s;display:inline-flex;align-items:center;gap:10px;
  }
  .btn-main:active{transform:scale(0.96)}.btn-main:disabled{opacity:0.5}
  .btn-main.locating svg{animation:spin 1s linear infinite}
  .status-bar{text-align:center;margin-top:10px;font-size:12px;color:var(--text-dim);display:flex;align-items:center;justify-content:center;gap:5px;min-height:20px;line-height:1.5;flex-wrap:wrap}
  .loc-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
  .loc-dot.ok{background:#00b894;box-shadow:0 0 6px rgba(0,184,148,0.5)}.loc-dot.err{background:#e74c3c}.loc-dot.loading{background:#f39c12;animation:fadeIn 0.5s ease infinite alternate}
  .divider{display:flex;align-items:center;gap:10px;margin:14px 0;width:100%;max-width:380px;color:var(--text-dim);font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--card-border)}
  .coord-box{display:flex;gap:8px;width:100%;max-width:380px}
  .coord-box input{flex:1;padding:12px 14px;font-size:14px;border:1px solid var(--card-border);border-radius:12px;background:var(--card-bg);color:var(--text);outline:none;font-family:inherit;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);min-width:0}
  .coord-box input:focus{border-color:var(--accent)}
  .coord-box input::placeholder{color:var(--text-dim);font-size:12px}
  .theme-clear .coord-box input{background:rgba(255,255,255,0.7);color:#3e2723}
  .coord-box button{padding:12px 16px;font-size:14px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#fff;font-weight:700;font-family:inherit;white-space:nowrap;flex-shrink:0}
  .coord-tip{font-size:11px;color:var(--text-dim);opacity:0.7;text-align:center;margin-top:8px;line-height:1.6}
  .card{position:relative;background:var(--card-bg);border-radius:20px;padding:24px;width:100%;max-width:380px;border:1px solid var(--card-border);box-shadow:0 16px 48px rgba(0,0,0,0.25);animation:slideUp 0.5s ease;overflow:hidden;z-index:1;margin-bottom:14px}
  .theme-clear .card{box-shadow:0 16px 48px rgba(0,0,0,0.08)}
  .city-name{font-size:18px;font-weight:700;color:var(--text)}
  .coords-label{font-size:10px;color:var(--text-dim);opacity:0.6;font-weight:300;margin-top:2px}
  .loc-method{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;margin-left:4px}
  .loc-method.amap{background:rgba(0,184,148,0.2);color:#00b894}
  .loc-method.manual{background:rgba(102,126,234,0.2);color:#667eea}
  .temp{font-size:52px;font-weight:900;line-height:1;margin:10px 0 4px;letter-spacing:-2px}
  .theme-rain .temp{color:#aed6f1}.theme-clear .temp{color:#e67e22}
  .details{font-size:12px;color:var(--text-dim);margin-bottom:16px;line-height:1.6}
  .alert{border-radius:14px;padding:16px;margin-bottom:16px}
  .alert-rain{background:linear-gradient(135deg,rgba(231,76,60,0.15),rgba(192,57,43,0.1));border:1px solid rgba(231,76,60,0.2)}
  .alert-clear{background:linear-gradient(135deg,rgba(39,174,96,0.12),rgba(46,204,113,0.08));border:1px solid rgba(39,174,96,0.15)}
  .alert-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700}
  .alert-rain .alert-title{color:#e74c3c}.alert-clear .alert-title{color:#27ae60}
  .alert-sub{font-size:13px;margin-top:6px;line-height:1.6;color:var(--text-dim)}
  .alert-keypoint{font-size:14px;margin-top:8px;color:var(--text);font-weight:500;line-height:1.5}
  .rain-chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
  .rain-chart{position:relative;height:80px;width:100%;background:rgba(0,0,0,0.1);border-radius:10px;overflow:hidden;margin-bottom:6px}
  .theme-clear .rain-chart{background:rgba(0,0,0,0.04)}
  .rain-bar{position:absolute;bottom:0;background:linear-gradient(to top,rgba(41,128,185,0.7),rgba(52,152,219,0.3));border-radius:2px 2px 0 0}
  .rain-bar.heavy{background:linear-gradient(to top,rgba(231,76,60,0.7),rgba(231,76,60,0.3))}
  .rain-bar.moderate{background:linear-gradient(to top,rgba(243,156,18,0.7),rgba(243,156,18,0.3))}
  .rain-time-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-dim)}
  .section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
  .hourly{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .hourly::-webkit-scrollbar{display:none}
  .hour-item{flex:0 0 auto;text-align:center;padding:10px 8px;border-radius:12px;min-width:50px;border:1px solid transparent}
  .hour-item.rain-hour{background:rgba(41,128,185,0.2);border-color:rgba(41,128,185,0.3)}
  .hour-label{font-size:11px;font-weight:500;color:var(--text-dim);margin-bottom:5px}
  .hour-emoji{font-size:18px;margin-bottom:3px}
  .hour-temp{font-size:13px;font-weight:700;color:var(--text)}
  .error-msg{color:#e74c3c;font-size:14px;background:rgba(231,76,60,0.1);padding:12px 18px;border-radius:10px;margin-bottom:16px;text-align:center;max-width:380px;width:100%}
  .powered{text-align:center;font-size:10px;color:var(--text-dim);opacity:0.4;margin-top:16px}
</style>
</head>
<body>
<div class="raindrops" id="raindrops"></div>
<div class="sun-glow"></div>

<div style="text-align:center;margin-bottom:12px;animation:fadeIn 0.8s ease;position:relative;z-index:1">
  <div class="hero-icon" id="heroIcon">🌤️</div>
  <h1 id="heroTitle">今天带伞吗？</h1>
  <div class="subtitle">精准降雨预报 · 高德定位 + 彩云天气</div>
</div>

<div class="action-area">
  <button class="btn-main" id="locBtn" onclick="amapLocate()">
    <svg id="locIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
    <span id="locBtnText">一键定位查天气</span>
  </button>
  <div class="status-bar" id="statusBar"></div>
</div>

<div class="divider">或粘贴坐标</div>
<div class="coord-box">
  <input type="text" id="coordInput" placeholder="经度,纬度（如 104.07,30.67）" autocomplete="off">
  <button onclick="manualSearch()">查询</button>
</div>
<div class="coord-tip">在地图APP长按位置 → 复制坐标 → 粘贴到这里</div>

<div id="errorBox" style="margin-top:16px"></div>
<div id="resultArea" style="margin-top:16px"></div>
<div class="powered">定位：高德地图 · 天气：彩云天气 · 1km分辨率 · 分钟级降雨预报</div>

<!-- 高德地图安全密钥 -->
<script>
window._AMapSecurityConfig = {
  securityJsCode: 'dd51a7fa733ca2c539c401e047879f34'
};
</script>
<!-- 高德地图 JS API 2.0 -->
<script src="https://webapi.amap.com/maps?v=2.0&key=c62e981f36705c1ad2bcd25dca9b3641"></script>

<script>
const CAIYUN_TOKEN='DpS87YWOT1lMMBPB';

const SKYCON_MAP={CLEAR_DAY:'☀️',CLEAR_NIGHT:'🌙',PARTLY_CLOUDY_DAY:'⛅',PARTLY_CLOUDY_NIGHT:'☁️',CLOUDY:'☁️',LIGHT_HAZE:'🌫️',MODERATE_HAZE:'🌫️',HEAVY_HAZE:'🌫️',LIGHT_RAIN:'🌧️',MODERATE_RAIN:'🌧️',HEAVY_RAIN:'🌧️',STORM_RAIN:'⛈️',FOG:'🌫️',LIGHT_SNOW:'❄️',MODERATE_SNOW:'❄️',HEAVY_SNOW:'❄️',STORM_SNOW:'❄️',DUST:'🌪️',SAND:'🌪️',WIND:'💨'};
const SKYCON_CN={CLEAR_DAY:'晴',CLEAR_NIGHT:'晴',PARTLY_CLOUDY_DAY:'多云',PARTLY_CLOUDY_NIGHT:'多云',CLOUDY:'阴',LIGHT_HAZE:'轻度雾霾',MODERATE_HAZE:'中度雾霾',HEAVY_HAZE:'重度雾霾',LIGHT_RAIN:'小雨',MODERATE_RAIN:'中雨',HEAVY_RAIN:'大雨',STORM_RAIN:'暴雨',FOG:'雾',LIGHT_SNOW:'小雪',MODERATE_SNOW:'中雪',HEAVY_SNOW:'大雪',STORM_SNOW:'暴雪',DUST:'浮尘',SAND:'沙尘',WIND:'大风'};
function isRainSkycon(s){return s&&s.includes('RAIN')}
function getEmoji(s){return SKYCON_MAP[s]||'🌤️'}
function getCN(s){return SKYCON_CN[s]||'未知'}

function createRaindrops(){const c=document.getElementById('raindrops');c.innerHTML='';for(let i=0;i<35;i++){const d=document.createElement('div');d.className='raindrop';const s=1+Math.random()*2;d.style.cssText=`left:${Math.random()*100}%;width:${s}px;height:${s*8}px;animation-duration:${0.6+Math.random()*0.5}s;animation-delay:${Math.random()*2}s;`;c.appendChild(d)}}
createRaindrops();

function setTheme(t){document.body.classList.remove('theme-rain','theme-clear');if(t)document.body.classList.add(t);document.querySelector('meta[name="theme-color"]').content=t==='theme-rain'?'#1a1a2e':t==='theme-clear'?'#fdf6e3':'#0f0c29'}
function showStatus(type,msg){document.getElementById('statusBar').innerHTML=`<span class="loc-dot ${type==='ok'?'ok':type==='err'?'err':'loading'}"></span> ${msg}`}
function showError(msg){document.getElementById('errorBox').innerHTML=`<div class="error-msg">${msg}</div>`;document.getElementById('resultArea').innerHTML=''}

// ===== JSONP for Caiyun =====
function jsonpFetch(url){
  return new Promise((resolve,reject)=>{
    const cbName='_cb_'+Math.random().toString(36).substr(2,8);
    const timeout=setTimeout(()=>{cleanup();reject(new Error('请求超时'))},15000);
    function cleanup(){delete window[cbName];const el=document.getElementById(cbName);if(el)el.remove();clearTimeout(timeout)}
    window[cbName]=function(data){cleanup();resolve(data)};
    const script=document.createElement('script');script.id=cbName;
    script.src=url+(url.includes('?')?'&':'?')+'callback='+cbName;
    script.onerror=function(){cleanup();reject(new Error('网络请求失败'))};
    document.head.appendChild(script);
  });
}

// ===== 高德定位 =====
function amapLocate(){
  const btn=document.getElementById('locBtn');
  btn.classList.add('locating');btn.disabled=true;
  document.getElementById('locBtnText').textContent='定位中...';
  showStatus('loading','正在通过高德定位获取精确位置...');
  document.getElementById('errorBox').innerHTML='';

  AMap.plugin('AMap.Geolocation',function(){
    const geolocation=new AMap.Geolocation({
      enableHighAccuracy:true,
      timeout:20000,
      GeoLocationFirst:true,  // 优先使用浏览器定位
      needAddress:true,       // 返回地址信息
      extensions:'all'
    });

    geolocation.getCurrentPosition(function(status,result){
      btn.classList.remove('locating');btn.disabled=false;
      document.getElementById('locBtnText').textContent='重新定位';

      if(status==='complete'){
        const lng=result.position.lng;
        const lat=result.position.lat;
        const addr=result.formattedAddress||'';
        const district=result.addressComponent?(result.addressComponent.district||result.addressComponent.city):'';
        const acc=result.accuracy?Math.round(result.accuracy):'?';

        showStatus('ok',`${district||addr} (${lng.toFixed(4)}, ${lat.toFixed(4)}) 精度${acc}m`);

        // 高德坐标是 GCJ-02，彩云天气也接受 GCJ-02，可以直接用
        fetchWeather(lng,lat,'amap',district||addr);
      }else{
        let errMsg='定位失败';
        if(result&&result.message){errMsg=result.message}
        showStatus('err','高德定位失败：'+errMsg);
        // 降级到IP定位
        showStatus('loading','正在尝试IP定位...');
        geolocation.getCityInfo(function(status2,result2){
          if(status2==='complete'&&result2.position){
            const lng=result2.position[0]||result2.position.lng;
            const lat=result2.position[1]||result2.position.lat;
            const city=result2.city||'';
            showStatus('ok',`IP定位到 ${city} (${lng.toFixed(2)}, ${lat.toFixed(2)}) · 城区级`);
            fetchWeather(lng,lat,'amap',city);
          }else{
            showStatus('err','所有定位方式均失败，请手动输入坐标');
          }
        });
      }
    });
  });
}

// ===== 手动输入 =====
document.getElementById('coordInput').addEventListener('keydown',e=>{if(e.key==='Enter')manualSearch()});
function manualSearch(){
  let val=document.getElementById('coordInput').value.trim().replace(/\s+/g,',').replace(/，/g,',');
  const parts=val.split(',').filter(s=>s);
  if(parts.length!==2){showError('格式：经度,纬度（如 104.07,30.67）');return}
  const a=parseFloat(parts[0]),b=parseFloat(parts[1]);
  if(isNaN(a)||isNaN(b)){showError('请输入有效数字');return}
  let lng,lat;
  if(a>70&&a<140){lng=a;lat=b}else if(b>70&&b<140){lng=b;lat=a}else{lng=a;lat=b}
  showStatus('ok',`坐标 (${lng.toFixed(4)}, ${lat.toFixed(4)})`);
  fetchWeather(lng,lat,'manual');
}

// ===== 获取天气 =====
async function fetchWeather(lng,lat,method,locationName){
  document.getElementById('errorBox').innerHTML='';
  document.getElementById('resultArea').innerHTML='<div style="text-align:center;color:var(--text-dim);padding:20px;animation:fadeIn 0.3s ease">🔄 加载天气数据...</div>';
  try{
    const url=`https://api.caiyunapp.com/v2.6/${CAIYUN_TOKEN}/${lng.toFixed(4)},${lat.toFixed(4)}/weather.jsonp?alert=true&dailysteps=1&hourlysteps=24&unit=metric:v2`;
    const data=await jsonpFetch(url);
    if(data.status!=='ok')throw new Error(data.status);
    renderWeather(data,lng,lat,method,locationName);
  }catch(e){
    showError('获取天气失败：'+e.message);
    document.getElementById('resultArea').innerHTML='';
    setTheme(null);
  }
}

function renderWeather(data,lng,lat,method,locationName){
  const rt=data.result.realtime,minutely=data.result.minutely,hourly=data.result.hourly;
  const keypoint=data.result.forecast_keypoint||'';
  const skycon=rt.skycon;
  const hasRain=isRainSkycon(skycon)||(minutely&&minutely.precipitation_2h&&minutely.precipitation_2h.some(v=>v>0.08));
  const isRaining=rt.precipitation&&rt.precipitation.local&&rt.precipitation.local.intensity>0.08;

  setTheme(hasRain?'theme-rain':'theme-clear');
  document.getElementById('heroIcon').textContent=hasRain?'☂️':'☀️';
  document.getElementById('heroTitle').textContent=hasRain?'记得带伞！':'不用带伞';

  const methodLabel=method==='amap'?'<span class="loc-method amap">高德定位</span>':'<span class="loc-method manual">手动</span>';
  let html='';

  html+=`<div class="card">
    <div><div class="city-name">${getEmoji(skycon)} ${getCN(skycon)}${locationName?' · '+locationName:''}</div>
      <div class="coords-label">📍 ${lng.toFixed(4)}, ${lat.toFixed(4)} ${methodLabel}</div>
    </div>
    <div class="temp">${rt.temperature.toFixed(1)}°</div>
    <div class="details">
      体感 ${rt.apparent_temperature.toFixed(0)}° · 湿度 ${Math.round(rt.humidity*100)}% · 风速 ${rt.wind.speed.toFixed(1)}km/h<br>
      能见度 ${rt.visibility.toFixed(1)}km${rt.air_quality?' · 空气'+rt.air_quality.description.chn:''}
    </div>
    <div class="alert ${hasRain?'alert-rain':'alert-clear'}">
      <div class="alert-title"><span>${hasRain?'☂️':'✅'}</span>
        <span>${isRaining?'正在下雨！出门带伞':hasRain?'即将有雨，建议带伞':'当前无雨，放心出门'}</span>
      </div>
      ${keypoint?`<div class="alert-keypoint">${keypoint}</div>`:''}
      ${minutely&&minutely.description?`<div class="alert-sub">${minutely.description}</div>`:''}
    </div>
  </div>`;

  const precip2h=minutely&&minutely.precipitation_2h||[];
  if(precip2h.length>0){
    const maxP=Math.max(...precip2h,0.5);const now=new Date();
    html+=`<div class="card"><div class="rain-chart-title">🔬 未来2小时逐分钟降雨</div><div class="rain-chart">`;
    const barW=100/precip2h.length;
    for(let i=0;i<precip2h.length;i++){const v=precip2h[i],h=Math.max(v/maxP*100,v>0.08?3:0);
      html+=`<div class="rain-bar ${v>10?'heavy':v>3?'moderate':''}" style="left:${i*barW}%;width:${Math.max(barW-0.2,0.5)}%;height:${h}%"></div>`}
    html+=`</div><div class="rain-time-labels">
      <span>现在${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}</span>
      <span>+30min</span><span>+1h</span><span>+1.5h</span><span>+2h</span></div>
      <div style="font-size:11px;color:var(--text-dim);margin-top:6px">
        ${precip2h.every(v=>v<0.08)?'🟢 未来2小时无降雨':'<span style="color:#3498db">■</span>小雨 <span style="color:#f39c12">■</span>中雨 <span style="color:#e74c3c">■</span>大雨'}
      </div></div>`;
  }

  if(hourly&&hourly.temperature&&hourly.temperature.length>0){
    html+=`<div class="card"><div class="section-title">📊 逐小时预报</div><div class="hourly">`;
    const len=Math.min(hourly.temperature.length,24);
    for(let i=0;i<len;i++){const t=hourly.temperature[i],s=hourly.skycon[i];
      const d=new Date(t.datetime),hr=d.getHours(),isR=isRainSkycon(s.value);
      html+=`<div class="hour-item ${isR?'rain-hour':''}"><div class="hour-label">${hr}时</div>
        <div class="hour-emoji">${getEmoji(s.value)}</div><div class="hour-temp">${t.value.toFixed(0)}°</div></div>`}
    html+=`</div></div>`;
  }

  document.getElementById('resultArea').innerHTML=html;
}

// 页面加载自动定位
window.addEventListener('load',()=>{setTimeout(amapLocate,800)});
</script>
</body>
</html>
